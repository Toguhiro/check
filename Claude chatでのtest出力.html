<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>try図面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
     color:#e6edf3;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#hdr{background:linear-gradient(90deg,#161b22,#21262d);padding:8px 18px;
     display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:2px solid #e94560}
.badge{background:#e94560;color:#fff;font-size:10px;font-weight:700;
       padding:2px 9px;border-radius:10px;letter-spacing:.5px}
#hdr h1{font-size:13px;font-weight:600;color:#c9d1d9}
#hdr .meta{font-size:10px;color:#8b949e;margin-left:auto}
#main{display:flex;flex:1;overflow:hidden}
#vwrap{flex:1;overflow:auto;background:#090d13;
       display:flex;align-items:flex-start;justify-content:flex-start}
#viewer{position:relative;display:inline-block;transform-origin:top left;
        line-height:0;flex-shrink:0}
#bg{display:block;position:relative;z-index:0}
#ov{position:absolute;top:0;left:0;z-index:1;pointer-events:none}
#hit{position:absolute;top:0;left:0;z-index:2;cursor:crosshair}
#zctrl{position:fixed;bottom:20px;right:302px;
       display:flex;flex-direction:column;gap:4px;z-index:300}
.zbtn{width:34px;height:34px;border-radius:8px;
      background:rgba(22,27,34,.92);border:1px solid #30363d;
      color:#c9d1d9;font-size:17px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all .15s;backdrop-filter:blur(6px)}
.zbtn:hover{background:#e94560;border-color:#e94560;color:#fff}
#sb{width:292px;flex-shrink:0;background:#161b22;
    border-left:1px solid #30363d;display:flex;flex-direction:column;overflow:hidden}
#sb-hdr{padding:10px 14px;background:#21262d;border-bottom:1px solid #30363d;
        font-size:12px;font-weight:700;color:#c9d1d9;
        display:flex;align-items:center;justify-content:space-between}
#sb-hdr small{font-size:10px;color:#8b949e;font-weight:400}
#sb-btns{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid #30363d;flex-shrink:0}
.sbtn{flex:1;padding:4px;border-radius:6px;border:1px solid #30363d;
      background:#21262d;color:#8b949e;font-size:10px;cursor:pointer;transition:all .15s}
.sbtn:hover{background:#388bfd22;color:#388bfd;border-color:#388bfd55}
#leg{flex:1;overflow-y:auto;padding:6px 8px}
.li{display:flex;align-items:center;gap:7px;padding:4px 6px;
    border-radius:5px;cursor:pointer;transition:background .1s;
    margin-bottom:1px;border:1px solid transparent}
.li:hover{background:#21262d;border-color:#30363d55}
.li.on{background:rgba(56,139,253,.06);border-color:#388bfd22}
.li.off{opacity:.35}
.dot{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.ln{font-size:11px;color:#c9d1d9;font-weight:500;flex:1;line-height:1.2}
.lc{font-size:10px;color:#6e7681;white-space:nowrap}
#tt{position:fixed;pointer-events:none;z-index:9999;
    background:rgba(13,17,23,.97);border:1px solid #388bfd;
    border-radius:10px;padding:10px 14px;max-width:270px;
    display:none;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.tt-c{font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;
      color:#fff;display:inline-block;margin-bottom:6px}
.tt-d{font-size:11px;color:#8b949e;line-height:1.5}
.tt-v{margin-top:5px;font-size:11px;color:#79c0ff;font-family:monospace;word-break:break-all}
#ibar{padding:5px 14px;background:#161b22;border-top:1px solid #30363d;
      font-size:10px;color:#6e7681;display:flex;justify-content:space-between;flex-shrink:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
</style>
</head>

  r.setAttribute('y',      y-pad);
  r.setAttribute('width',  Math.max(w+pad*2, 1));
  r.setAttribute('height', Math.max(h+pad*2, 1));
  r.setAttribute('fill',   h2r(ci.color, ci.alpha));
  r.setAttribute('stroke', ci.color);
  r.setAttribute('stroke-width',   e.t==='text' ? '0.3' : '0.2');
  r.setAttribute('stroke-opacity', '0.35');
  OG[e.c].appendChild(r);

  var hp = Math.max(3, pad+1);
  var hr = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hr.setAttribute('x',      x-hp);
  hr.setAttribute('y',      y-hp);
  hr.setAttribute('width',  Math.max(w+hp*2, 4));
  hr.setAttribute('height', Math.max(h+hp*2, 4));
  hr.style.fill = 'transparent';
  (function(ee, cii) {
    hr.addEventListener('mouseenter', function(ev) { showTT(ev,ee,cii); });
    hr.addEventListener('mousemove',  function(ev) { moveTT(ev); });
    hr.addEventListener('mouseleave', hideTT);
  })(e, ci);
  HG[e.c].appendChild(hr);
});

var tt = document.getElementById('tt');
function showTT(ev, e, ci) {
  document.getElementById('tt-c').textContent      = e.c;
  document.getElementById('tt-c').style.background = ci.color;
  document.getElementById('tt-d').textContent      = ci.desc;
  document.getElementById('tt-v').textContent      = e.v ? '"' + e.v + '"' : '（図形/配線要素）';
  tt.style.display='block'; moveTT(ev);
  document.getElementById('il').textContent = '📌 ' + e.c + ': ' + ci.desc;
}
function moveTT(ev) {
  var x=ev.clientX+16, y=ev.clientY+16;
  if (x+280>window.innerWidth)  x=ev.clientX-280;
  if (y+120>window.innerHeight) y=ev.clientY-120;
  tt.style.left=x+'px'; tt.style.top=y+'px';
}
function hideTT() {
  tt.style.display='none';
  document.getElementById('il').textContent='マウスオーバーで分類情報を表示  |  Ctrl+ホイールでズーム';
}

var leg = document.getElementById('leg');
CO.forEach(function(c) {
  if (!CI[c]) return;
  var ci=CI[c], cnt=(byC[c]||[]).length;
  if (!cnt) return;
  var el=document.createElement('div');
  el.className='li on'; el.dataset.cat=c;
  el.innerHTML = '<div class="dot" style="background:'+h2r(ci.color,.65)+
    ';border:1px solid '+ci.color+'55"></div>'+
    '<span class="ln">'+c+'</span><span class="lc">'+cnt+'</span>';
  (function(cc, eel) { el.onclick=function(){toggle(cc,eel);}; })(c,el);
  leg.appendChild(el);
});

function toggle(c, el) {
  vis[c]=!vis[c];
  OG[c].style.display=vis[c]?'':'none';
  HG[c].style.display=vis[c]?'':'none';
  el.classList.toggle('on',vis[c]); el.classList.toggle('off',!vis[c]);
}
function showAll() {
  CO.forEach(function(c){vis[c]=true;if(OG[c])OG[c].style.display='';if(HG[c])HG[c].style.display='';});
  document.querySelectorAll('.li').forEach(function(e){e.classList.add('on');e.classList.remove('off');});
}
function hideAll() {
  CO.forEach(function(c){vis[c]=false;if(OG[c])OG[c].style.display='none';if(HG[c])HG[c].style.display='none';});
  document.querySelectorAll('.li').forEach(function(e){e.classList.remove('on');e.classList.add('off');});
}

applyScale();
</script>
</body>
